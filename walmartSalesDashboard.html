<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walmart线下数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <!-- React 核心 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Ant Design -->
    <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css">
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/locale/zh-cn.js"></script>
    <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
    
    <!-- Babel 用于转译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary-color: #41B983;
            --secondary-color: #38A169;
            --warning-color: #ED8936;
            --error-color: #E53E3E;
            --bg-color: #F7FAFC;
            --border-color: #E2E8F0;
            --text-primary: #2D3748;
            --text-secondary: #718096;
            --card-bg: #FFFFFF;
            --sidebar-bg: #001529;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .import-btn-wrapper {
            margin-left: auto;
        }

        .import-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2B6CB0;
            color: white;
        }

        .btn-primary:hover {
            background: #2c5282;
        }

        .btn-secondary {
            background: var(--card-bg);
            color: #2B6CB0;
            border: 1px solid #2B6CB0;
        }

        .btn-secondary:hover {
            background: var(--bg-color);
        }

        .btn-success {
            background: var(--primary-color);
            color: white;
        }

        .btn-success:hover {
            background: var(--secondary-color);
        }

        .btn-info {
            background: transparent;
            color: #2B6CB0;
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid #2B6CB0;
            border-radius: 4px;
        }

        .btn-info:hover {
            background: #EDF2F7;
        }

        .file-name {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .filter-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-color);
            border-radius: 6px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 400;
        }

        .filter-group input {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            height: 36px;
        }

        .filter-group input:focus {
            outline: none;
            border-color: #2B6CB0;
            box-shadow: 0 0 0 2px rgba(43, 108, 176, 0.1);
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card.orange {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.green {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.yellow {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #EDF2F7;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #4A5568;
            font-size: 14px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        tbody tr:nth-child(even) {
            background: var(--bg-color);
        }

        tbody tr:hover {
            background: #EBF8FF;
        }

        .rank {
            font-weight: 600;
            color: var(--primary-color);
            text-align: center;
        }

        .rank-1 {
            color: #D69E2E;
        }

        .rank-2 {
            color: #A0AEC0;
        }

        .rank-3 {
            color: #CD7F32;
        }

        .amount {
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            background: var(--primary-color);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .modal-chart {
            width: 100%;
            height: 400px;
        }

        .import-success {
            display: none;
            background: #C6F6D5;
            color: #22543D;
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 12px;
            border: 1px solid #9AE6B4;
        }

        .import-success.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .page-title {
                font-size: 20px;
            }

            .filter-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }
        }

        /* 收款看板样式 */
        .collection-table-wrapper {
            height: 600px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .collection-table-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .collection-table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .collection-table-wrapper::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .collection-table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .collection-table {
            font-size: 13px;
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        .collection-table thead th {
            background: #EDF2F7;
            font-size: 12px;
            padding: 10px 6px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .collection-table thead th[title] {
            cursor: help;
            color: #2B6CB0;
            font-weight: 600;
            text-decoration: underline dotted;
            text-underline-offset: 3px;
        }

        .collection-table thead th[title]:hover {
            background: #E6FFFA;
            color: #234E52;
        }

        .section-header {
            background: #E2E8F0 !important;
            font-weight: 700;
            font-size: 14px !important;
            width: 100px;
            vertical-align: middle;
        }

        .subsection-header {
            background: #F7FAFC !important;
            font-weight: 600;
            font-size: 13px !important;
            border-left: 1px solid var(--border-color);
        }

        .highlight-header {
            background: #FEFCBF !important;
            color: #975A16;
            font-weight: 700;
        }

        .highlight-col {
            background: #FFFAE6 !important;
            color: #B7791F;
            font-weight: 600;
        }

        .negative-col {
            color: #C53030 !important;
        }

        .collection-table tbody tr td:nth-child(1) { width: 10%; min-width: 100px; }
        .collection-table tbody tr td:nth-child(2) { width: 8%; }
        .collection-table tbody tr td:nth-child(3) { width: 8%; }
        .collection-table tbody tr td:nth-child(4) { width: 7%; }
        .collection-table tbody tr td:nth-child(5) { width: 8%; }
        .collection-table tbody tr td:nth-child(6) { width: 12%; }
        .collection-table tbody tr td:nth-child(7) { width: 12%; }
        .collection-table tbody tr td:nth-child(8) { width: 12%; }
        .collection-table tbody tr td:nth-child(9) { width: 8%; }
        .collection-table tbody tr td:nth-child(10) { width: 13%; }
        .collection-table tbody tr td:nth-child(11) { width: 14%; }

        .collection-table thead tr th:nth-child(1) { width: 10%; min-width: 100px; }
        .collection-table thead tr th:nth-child(2) { width: 8%; }
        .collection-table thead tr th:nth-child(3) { width: 8%; }
        .collection-table thead tr th:nth-child(4) { width: 7%; }
        .collection-table thead tr th:nth-child(5) { width: 8%; }
        .collection-table thead tr th:nth-child(6) { width: 12%; }
        .collection-table thead tr th:nth-child(7) { width: 12%; }
        .collection-table thead tr th:nth-child(8) { width: 12%; }
        .collection-table thead tr th:nth-child(9) { width: 8%; }
        .collection-table thead tr th:nth-child(10) { width: 13%; }
        .collection-table thead tr th:nth-child(11) { width: 14%; }

        .collection-table tfoot tr td:nth-child(1) { width: 10%; min-width: 100px; }
        .collection-table tfoot tr td:nth-child(2) { width: 8%; }
        .collection-table tfoot tr td:nth-child(3) { width: 8%; }
        .collection-table tfoot tr td:nth-child(4) { width: 7%; }
        .collection-table tfoot tr td:nth-child(5) { width: 8%; }
        .collection-table tfoot tr td:nth-child(6) { width: 12%; }
        .collection-table tfoot tr td:nth-child(7) { width: 12%; }
        .collection-table tfoot tr td:nth-child(8) { width: 12%; }
        .collection-table tfoot tr td:nth-child(9) { width: 8%; }
        .collection-table tfoot tr td:nth-child(10) { width: 13%; }
        .collection-table tfoot tr td:nth-child(11) { width: 14%; }

        .collection-table tbody {
            display: block;
            overflow-y: auto;
            max-height: calc(600px - 120px);
            scrollbar-width: thin;
            scrollbar-color: #888 #f1f1f1;
            padding-bottom: 8px;
        }

        .collection-table thead, .collection-table tfoot {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .collection-table tbody td {
            padding: 8px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .collection-table tbody td:first-child {
            text-align: left;
            font-weight: 500;
        }

        .collection-table tbody tr:hover {
            background: #EBF8FF;
        }

        .collection-table tfoot {
            background: #EDF2F7;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .collection-table tfoot td {
            background: #EDF2F7;
            font-weight: 700;
            font-size: 13px;
            padding: 12px 8px;
            text-align: right;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
        }

        .collection-table tfoot td:first-child {
            text-align: left;
            font-weight: 700;
            color: var(--text-primary);
        }

        .negative-value {
            color: #C53030;
            font-weight: 600;
        }

        .positive-value {
            color: #38A169;
            font-weight: 600;
        }

        .summary-row {
            background: #F0FFF4 !important;
            font-weight: 600;
        }

        .summary-date {
            color: #2F855A !important;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">🛒 Walmart线下数据看板</h1>
        
        <div class="card">
            <div class="card-title">
                <span class="card-title-left">📊 店铺销售数据</span>
                <div class="import-btn-wrapper">
                    <button class="btn btn-primary" onclick="openImportModal()">📥 导入数据</button>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-group">
                    <label>开始日期：</label>
                    <input type="date" id="startDate1">
                </div>
                <div class="filter-group">
                    <label>结束日期：</label>
                    <input type="date" id="endDate1">
                </div>
                <button class="btn btn-primary" onclick="queryData(1)">🔎 查询</button>
            </div>
            <div class="stats-cards" id="statsCards">
                <div class="stat-card">
                    <div class="stat-value" id="totalSalesAmount">$0</div>
                    <div class="stat-label">总销售额</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-value" id="avgDailySales">$0</div>
                    <div class="stat-label">日均销售额</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-value" id="totalQuantity">0</div>
                    <div class="stat-label">总销量</div>
                </div>
                <div class="stat-card yellow">
                    <div class="stat-value" id="avgDailyQuantity">0</div>
                    <div class="stat-label">日均销量</div>
                </div>
            </div>
            <div id="salesTrendChart" class="chart-container"></div>
        </div>
        
        <div class="card">
            <div class="card-title">🏆 热销产品榜单</div>
            <div class="filter-section">
                <div class="filter-group">
                    <label>开始日期：</label>
                    <input type="date" id="startDate2">
                </div>
                <div class="filter-group">
                    <label>结束日期：</label>
                    <input type="date" id="endDate2">
                </div>
                <button class="btn btn-primary" onclick="queryData(2)">🔎 查询</button>
            </div>
            <div class="table-container">
                <table id="productTable">
                    <thead>
                        <tr>
                            <th style="text-align: center; width: 80px;">排名</th>
                            <th>商品编号</th>
                            <th style="text-align: right;">总销量</th>
                            <th style="text-align: right;">总销售额</th>
                            <th style="text-align: center; width: 160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 收款看板模块 -->
        <div class="card">
            <div class="card-title">💰 收款看板</div>
            <div class="filter-section">
                <div class="filter-group">
                    <label>月份范围：</label>
                    <div id="monthRangePicker" style="width: 300px; display: inline-block;"></div>
                </div>
                <button class="btn btn-primary" onclick="queryCollectionData()">🔎 查询</button>
            </div>
            <div class="collection-table-wrapper">
                <table id="collectionTable" class="collection-table">
                    <thead id="collectionTableHead">
                        <tr>
                            <th colspan="7" class="subsection-header">总结</th>
                            <th colspan="4" class="subsection-header highlight-header">收款进度 N42</th>
                        </tr>
                        <tr>
                            <th>PO DATE</th>
                            <th title="MelodySusie PC180E Cordless Rechargeable Nail Drill">0506588010134</th>
                            <th title="MelodySusie PC650E Cordless Rechargeable Pedicure Drill">0506001010168</th>
                            <th>TTL<br/>Cases</th>
                            <th>TTL Units</th>
                            <th>PO 金额<br/>(US$)</th>
                            <th>应收款<br/>(US$)</th>
                            <th class="highlight-col">已收款<br/>(US$)</th>
                            <th class="highlight-col">回款%</th>
                            <th class="highlight-col negative-col">扣款金额<br/>(US$)</th>
                            <th class="highlight-col negative-col">扣款比例%</th>
                        </tr>
                    </thead>
                    <tbody id="collectionTableBody">
                    </tbody>
                    <tfoot id="collectionTableFoot">
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="importModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3>📥 导入数据</h3>
                <button class="modal-close" onclick="closeImportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;" onchange="handleFileSelect(event)">
                <p id="selectedFileName" style="margin-bottom: 16px; color: var(--text-secondary);">未选择文件</p>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📂 选择Excel文件</button>
                <div class="import-success" id="importSuccess" style="margin-top: 16px;">
                    ✅ 数据导入成功！共导入 <span id="importCount">0</span> 条记录
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
                <button class="btn btn-success" id="confirmImportBtn" onclick="confirmImport()">确认导入</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="productDetailModalOverlay">
        <div class="modal" style="max-width: 900px;">
            <div class="modal-header">
                <h3 id="productModalTitle">产品详细数据</h3>
                <button class="modal-close" onclick="closeProductDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="productDetailChart" class="modal-chart"></div>
            </div>
        </div>
    </div>
    
    <script>

        function filterDataByDateRange(data, startDate, endDate) {
            return data.filter(record => {
                const date = record.sale_date;
                return date >= startDate && date <= endDate;
            });
        }

        // ==================== 数据处理 ====================
        function getDailySalesData(data) {
            const dailyMap = new Map();
            
            data.forEach(record => {
                if (dailyMap.has(record.sale_date)) {
                    const existing = dailyMap.get(record.sale_date);
                    existing.quantity += record.quantity;
                    existing.sales_amount += record.sales_amount;
                } else {
                    dailyMap.set(record.sale_date, {
                        date: record.sale_date,
                        quantity: record.quantity,
                        sales_amount: record.sales_amount
                    });
                }
            });
            
            return Array.from(dailyMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

        function getProductSalesData(data) {
            const productMap = new Map();
            
            data.forEach(record => {
                if (productMap.has(record.product_code)) {
                    const existing = productMap.get(record.product_code);
                    existing.quantity += record.quantity;
                    existing.sales_amount += record.sales_amount;
                } else {
                    productMap.set(record.product_code, {
                        product_code: record.product_code,
                        quantity: record.quantity,
                        sales_amount: record.sales_amount
                    });
                }
            });
            
            return Array.from(productMap.values())
                .sort((a, b) => b.sales_amount - a.sales_amount);
        }

        function getProductDailyData(data, productCode) {
            const dailyMap = new Map();
            
            data.forEach(record => {
                if (record.product_code === productCode) {
                    if (dailyMap.has(record.sale_date)) {
                        const existing = dailyMap.get(record.sale_date);
                        existing.quantity += record.quantity;
                        existing.sales_amount += record.sales_amount;
                    } else {
                        dailyMap.set(record.sale_date, {
                            date: record.sale_date,
                            quantity: record.quantity,
                            sales_amount: record.sales_amount
                        });
                    }
                }
            });
            
            return Array.from(dailyMap.values()).sort((a, b) => a.date.localeCompare(b.date));
        }

            if (startDate > endDate) {
                alert('开始日期不能大于结束日期！');

            }
            
            filteredData = filterDataByDateRange(salesData, startDate, endDate);
            renderAll();

            const endMonth = window.selectedMonthRange ? window.selectedMonthRange.end : '2026-04';
            
            if (!startMonth || !endMonth) {
                alert('请选择月份范围！');
                return;

            if (startMonth > endMonth) {
                alert('开始月份不能大于结束月份！');
                return;
            }
            
            filteredCollectionData = filterCollectionByMonthRange(collectionData, startMonth, endMonth);
            renderCollectionDashboard();
        }

        function filterCollectionByMonthRange(data, startMonth, endMonth) {
            return data.filter(record => {
                const recordMonth = extractMonthFromPoDate(record.poDate);
                return recordMonth >= startMonth && recordMonth <= endMonth;
            });
        }

        function extractMonthFromPoDate(poDate) {
            if (poDate.includes('汇总')) {
                const match = poDate.match(/(\d{4})(\d{2})/);
                if (match) {
                    return `${match[1]}-${match[2]}`;
                }
            } else {
                const parts = poDate.split('/');
                if (parts.length >= 2) {
                    const year = parts[0];
                    const month = parts[1].padStart(2, '0');
                    return `${year}-${month}`;
                }
            }
            return '';
        }

                    {
                        type: 'value',
                        name: '销量',
                        axisLabel: {
                            formatter: (value) => value.toLocaleString()
                        }
                    }
                ],
                series: [
                    {
                        name: '销售额',
                        type: 'line',
                        data: salesAmounts,
                        smooth: true,
                        lineStyle: { width: 3 },
                        itemStyle: { color: '#41B983' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(65, 185, 131, 0.3)' },
                                { offset: 1, color: 'rgba(65, 185, 131, 0.05)' }
                            ])
                        }
                    },
                    {
                        name: '销量',
                        type: 'bar',
                        yAxisIndex: 1,
                        data: quantities,
                        itemStyle: { color: '#f5576c' }
                    }
                ]
            };
            
            salesTrendChart.setOption(option);
        }

        function renderProductTable() {
            const productData = getProductSalesData(filteredData);
            const tbody = document.getElementById('productTableBody');
            
            if (productData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = productData.map((p, index) => `
                <tr>
                    <td class="rank rank-${index + 1}">${index + 1}</td>
                    <td>${p.product_code}</td>
                    <td class="amount">${p.quantity.toLocaleString()}</td>
                    <td class="amount">${formatMoney(p.sales_amount)}</td>
                    <td style="text-align: center;">
                        <button class="btn btn-info" onclick="showProductDetail('${p.product_code}')">
                            📊 详细数据
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ==================== 收款看板渲染函数 ====================
        function renderCollectionDashboard() {
            renderCollectionTable();
            renderCollectionFoot();
            syncCollectionTableColumns();
        }

        function syncCollectionTableColumns() {
            const table = document.getElementById('collectionTable');
            if (!table) return;
            
            const thead = table.querySelector('thead tr:last-child');
            const tbody = table.querySelector('tbody tr:first-child');
            const tfoot = table.querySelector('tfoot tr:first-child');
            
            if (!thead || !tbody) return;
            
            setTimeout(() => {
                const headerCells = thead.querySelectorAll('th');
                const bodyCells = tbody.querySelectorAll('td');
                
                headerCells.forEach((th, index) => {
                    if (bodyCells[index]) {
                        const width = th.offsetWidth;
                        bodyCells[index].style.width = width + 'px';
                        bodyCells[index].style.minWidth = width + 'px';
                        bodyCells[index].style.maxWidth = width + 'px';
                    }
                });
                
                if (tfoot) {
                    const footCells = tfoot.querySelectorAll('td');
                    headerCells.forEach((th, index) => {
                        if (footCells[index]) {
                            const width = th.offsetWidth;
                            footCells[index].style.width = width + 'px';
                            footCells[index].style.minWidth = width + 'px';
                            footCells[index].style.maxWidth = width + 'px';
                        }
                    });
                }
            }, 0);
        }

        function renderCollectionTable() {
            const tbody = document.getElementById('collectionTableBody');
            const dataToRender = filteredCollectionData.length > 0 ? filteredCollectionData : collectionData;
            
            if (dataToRender.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="empty-state">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = dataToRender.map(record => {
                const isSummaryRow = record.poDate.includes('汇总');
                const rowClass = isSummaryRow ? 'summary-row' : '';
                const dateClass = isSummaryRow ? 'summary-date' : '';
                
                return `
                    <tr class="${rowClass}">
                        <td class="${dateClass}">${record.poDate}</td>
                        <td>${formatNumber(record.msNailDrill)}</td>
                        <td>${formatNumber(record.msPediDrill)}</td>
                        <td>${formatNumber(record.ttlCases)}</td>
                        <td>${formatNumber(record.ttlUnits)}</td>
                        <td>${formatMoney(record.poAmount)}</td>
                        <td>${formatMoney(record.receivable)}</td>
                        <td class="highlight-col">${formatMoney(record.received)}</td>
                        <td class="highlight-col">${record.collectionRate}%</td>
                        <td class="highlight-col negative-col">${record.deductionAmount !== null && record.deductionAmount !== undefined ? '(' + formatMoney(Math.abs(record.deductionAmount)) + ')' : ''}</td>
                        <td class="highlight-col negative-col">${record.deductionRate !== null && record.deductionRate !== undefined ? record.deductionRate.toFixed(2) + '%' : ''}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderCollectionFoot() {
            const tfoot = document.getElementById('collectionTableFoot');
            const dataToRender = filteredCollectionData.length > 0 ? filteredCollectionData : collectionData;
            
            const totals = {
                msNailDrill: dataToRender.reduce((sum, r) => sum + r.msNailDrill, 0),
                msPediDrill: dataToRender.reduce((sum, r) => sum + r.msPediDrill, 0),
                ttlCases: dataToRender.reduce((sum, r) => sum + r.ttlCases, 0),
                ttlUnits: dataToRender.reduce((sum, r) => sum + r.ttlUnits, 0),
                poAmount: dataToRender.reduce((sum, r) => sum + r.poAmount, 0),
                receivable: dataToRender.reduce((sum, r) => sum + r.receivable, 0),
                received: dataToRender.reduce((sum, r) => sum + r.received, 0)
            };
            
            const totalDeduction = dataToRender
                .filter(r => r.deductionAmount !== null && r.deductionAmount !== undefined)
                .reduce((sum, r) => sum + r.deductionAmount, 0);
            
            const overallRate = totals.receivable > 0 ? ((totals.received / totals.receivable) * 100).toFixed(1) : 0;
            const deductionRate = totals.receivable > 0 ? ((totalDeduction / totals.receivable) * 100).toFixed(2) : 0;
            
            tfoot.innerHTML = `
                <tr>
                    <td>总计</td>
                    <td>${formatNumber(totals.msNailDrill)}</td>
                    <td>${formatNumber(totals.msPediDrill)}</td>
                    <td>${formatNumber(totals.ttlCases)}</td>
                    <td>${formatNumber(totals.ttlUnits)}</td>
                    <td>${formatMoney(totals.poAmount)}</td>
                    <td>${formatMoney(totals.receivable)}</td>
                    <td class="highlight-col">${formatMoney(totals.received)}</td>
                    <td class="highlight-col">${overallRate}%</td>
                    <td class="highlight-col negative-col">(${formatMoney(Math.abs(totalDeduction))})</td>
                    <td class="highlight-col negative-col">${deductionRate}%</td>
                </tr>
            `;
        }

        // ==================== 导入弹窗功能 ====================
        let selectedFile = null;

        function openImportModal() {
            document.getElementById('importModalOverlay').classList.add('active');
            document.getElementById('selectedFileName').textContent = '未选择文件';
            document.getElementById('importSuccess').classList.remove('show');
            document.getElementById('confirmImportBtn').disabled = true;
            selectedFile = null;
        }

        function closeImportModal() {
            document.getElementById('importModalOverlay').classList.remove('active');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('selectedFileName').textContent = file.name;
                document.getElementById('confirmImportBtn').disabled = false;
            }
        }

        function confirmImport() {
            if (!selectedFile) {
                alert('请先选择Excel文件！');
                return;
            }
            
            // 模拟导入成功
            document.getElementById('importCount').textContent = salesData.length;
            document.getElementById('importSuccess').classList.add('show');
            document.getElementById('confirmImportBtn').disabled = true;
            
            setTimeout(() => {
                closeImportModal();
            }, 1500);
        }

        // ==================== 产品详情弹窗功能 ====================
        function showProductDetail(productCode) {
            const productDailyData = getProductDailyData(filteredData, productCode);
            
            document.getElementById('productModalTitle').textContent = `📊 ${productCode} - 每日销售详情`;
            document.getElementById('productDetailModalOverlay').classList.add('active');
            
            const chartDom = document.getElementById('productDetailChart');
            
            if (productDetailChart) {
                productDetailChart.dispose();
            }
            
            productDetailChart = echarts.init(chartDom);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: {
                    data: ['销售额', '销量'],
                    bottom: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: productDailyData.map(d => d.date),
                    axisLabel: {
                        rotate: 45,
                        fontSize: 11
                    }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '销售额',
                        axisLabel: {
                            formatter: (value) => '$' + value.toLocaleString()
                        }
                    },
                    {
                        type: 'value',
                        name: '销量',
                        axisLabel: {
                            formatter: (value) => value.toLocaleString()
                        }
                    }
                ],
                series: [
                    {
                        name: '销售额',
                        type: 'line',
                        data: productDailyData.map(d => d.sales_amount),
                        smooth: true,
                        lineStyle: { width: 3 },
                        itemStyle: { color: '#41B983' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(65, 185, 131, 0.3)' },
                                { offset: 1, color: 'rgba(65, 185, 131, 0.05)' }
                            ])
                        }
                    },
                    {
                        name: '销量',
                        type: 'bar',
                        yAxisIndex: 1,
                        data: productDailyData.map(d => d.quantity),
                        itemStyle: { color: '#f5576c' }
                    }
                ]
            };
            
            productDetailChart.setOption(option);
        }

        function closeProductDetailModal() {
            document.getElementById('productDetailModalOverlay').classList.remove('active');
        }

        function bindEvents() {
            // 产品详情弹窗关闭
            document.getElementById('productDetailModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeProductDetailModal();
                }
            });
            
            // 导入弹窗关闭
            document.getElementById('importModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeImportModal();
                }
            });
            
            // 窗口大小改变时重绘图表
            window.addEventListener('resize', function() {
                if (salesTrendChart) {
                    salesTrendChart.resize();
                }
                if (productDetailChart) {
                    productDetailChart.resize();
                }
                syncCollectionTableColumns();
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
    
    <!-- React 组件（需要 Babel 转译） -->
    <script type="text/babel">
        const { DatePicker } = antd;
        const { useState, useEffect } = React;
        
        function MonthRangePicker() {
            const [dates, setDates] = useState([
                dayjs('2025-12', 'YYYY-MM'),
                dayjs('2026-04', 'YYYY-MM')
            ]);
            
            useEffect(() => {
                if (dates && dates[0] && dates[1]) {
                    window.selectedMonthRange.start = dates[0].format('YYYY-MM');
                    window.selectedMonthRange.end = dates[1].format('YYYY-MM');
                }
            }, [dates]);
            
            return (
                <DatePicker.RangePicker
                    picker="month"
                    value={dates}
                    onChange={(dates) => {
                        if (dates) {
                            setDates(dates);
                        }
                    }}
                    format="YYYY年MM月"
                    placeholder={['开始月份', '结束月份']}
                    style={{ width: '100%' }}
                />
            );
        }
        
        ReactDOM.render(
            <MonthRangePicker />,
            document.getElementById('monthRangePicker')
        );
    </script>
</body>
</html>
