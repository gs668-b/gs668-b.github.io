        // 渲染日历函数 - 完全重写确保显示所有日期
        function renderCalendar(year, data) {
            const containerId = `calendar${year}`;
            const container = document.getElementById(containerId);
            
            // 清空容器
            container.innerHTML = '';
            
            // 创建星期标题行
            const weekRow = document.createElement('div');
            weekRow.className = 'week-row';
            
            weekDays.forEach(day => {
                const dayLabel = document.createElement('div');
                dayLabel.className = 'day-label';
                dayLabel.textContent = `周${day}`;
                weekRow.appendChild(dayLabel);
            });
            
            container.appendChild(weekRow);
            
            // 创建日历网格容器
            const calendarGrid = document.createElement('div');
            calendarGrid.className = 'calendar-grid';
            container.appendChild(calendarGrid);
            
            // 获取该月第一天是星期几
            const firstDay = new Date(`${year}-02-01`).getDay(); // 0=周日, 1=周一, ..., 6=周六
            
            // 计算该月的天数
            const daysInMonth = year === 2024 ? 29 : 28; // 2024是闰年
            
            // 计算需要的周数
            const totalCells = firstDay + daysInMonth;
            const weeksNeeded = Math.ceil(totalCells / 7);
            
            // 确保至少显示5周，这样所有年份的日历高度一致
            const displayWeeks = Math.max(weeksNeeded, 5);
            
            // 创建日历网格
            for (let week = 0; week < displayWeeks; week++) {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week';
                
                for (let weekday = 0; weekday < 7; weekday++) {
                    const dayIndex = week * 7 + weekday;
                    
                    // 如果日期在当月范围内
                    if (dayIndex >= firstDay && dayIndex < firstDay + daysInMonth) {
                        const dateNum = dayIndex - firstDay + 1;
                        const dateStr = `${year}-02-${dateNum.toString().padStart(2, '0')}`;
                        const dayData = data.find(d => d.day === dateStr);
                        
                        const dayCell = document.createElement('div');
                        dayCell.className = 'day-cell';
                        
                        if (dayData) {
                            // 计算温度颜色
                            const high = dayData.high;
                            let bgColor;
                            
                            if (high <= -20) bgColor = '#4575b4';
                            else if (high <= -15) bgColor = '#91bfdb';
                            else if (high <= -10) bgColor = '#e0f3f8';
                            else if (high <= -5) bgColor = '#ffffbf';
                            else if (high <= 0) bgColor = '#fee090';
                            else bgColor = '#fc8d59';
                            
                            dayCell.style.backgroundColor = bgColor;
                            
                            // 添加日期
                            const dateNumber = document.createElement('div');
                            dateNumber.className = 'date-number';
                            dateNumber.textContent = dateNum;
                            dayCell.appendChild(dateNumber);
                            
                            // 添加天气图标
                            const weatherIcon = document.createElement('div');
                            weatherIcon.className = 'weather-icon';
                            weatherIcon.textContent = weatherSymbols[dayData.weather] || '?';
                            weatherIcon.style.color = weatherColors[dayData.weather] || '#95a5a6';
                            dayCell.appendChild(weatherIcon);
                            
                            // 添加温度
                            const temperature = document.createElement('div');
                            temperature.className = 'temperature';
                            temperature.innerHTML = `<div class="high-temp-display">${dayData.high}°</div>
                                                    <div class="low-temp-display">${dayData.low}°</div>`;
                            dayCell.appendChild(temperature);
                            
                            // 添加tooltip
                            const weekDayName = weekDays[weekday];
                            dayCell.title = `${dateStr} 周${weekDayName}\n天气：${dayData.weather}\n最高气温：${dayData.high}°C\n最低气温：${dayData.low}°C`;
                        } else {
                            // 如果没有数据，只显示日期
                            const dateNumber = document.createElement('div');
                            dateNumber.className = 'date-number';
                            dateNumber.textContent = dateNum;
                            dayCell.appendChild(dateNumber);
                        }
                        
                        weekDiv.appendChild(dayCell);
                    } else {
                        // 创建空单元格
                        const emptyCell = document.createElement('div');
                        emptyCell.className = 'empty-cell';
                        weekDiv.appendChild(emptyCell);
                    }
                }
                
                calendarGrid.appendChild(weekDiv);
            }
        }
        
        // 渲染所有日历
        function renderAllCalendars() {
            renderCalendar(2023, data2023);
            renderCalendar(2024, data2024);
            renderCalendar(2025, data2025);
        }
        
        // 切换显示年份
        function showYear(year) {
            // 隐藏所有年份
            document.getElementById('year-2023').style.display = 'none';
            document.getElementById('year-2024').style.display = 'none';
            document.getElementById('year-2025').style.display = 'none';
            
            // 显示选中的年份
            document.getElementById(`year-${year}`).style.display = 'block';
            
            // 更新按钮状态
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // 页面加载完成后初始化日历
        window.addEventListener('load', function() {
            renderAllCalendars();
        });
    </script>
</body>
</html>
